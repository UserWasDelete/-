<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>園遊會傳單</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333;
            overflow: hidden;
        }

        #flyer-wrapper {
            position: relative;
            /* 關鍵：使用 inline-grid 確保容器寬度完全由圖片寬度決定 */
            display: inline-grid;
            line-height: 0;
        }

        #flyer-image {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100svh;
            width: auto;
            height: auto;
        }

        .coupon {
            position: absolute;
            width: 50%;
            height: 19.374%;
            top: 80.626%;
            z-index: 1000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #yellow-coupon {
            left: 0;
        }

        #orange-coupon {
            left: 50%;
        }

        .coupon:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="flyer-wrapper">
        <img src="園遊會傳單604結構.png" alt="園遊會傳單" id="flyer-image">
        <img src="黃折價券.png" alt="黃折價券" class="coupon" id="yellow-coupon" onclick="useCoupon(this, '黃折價券已使用.png')">
        <img src="橘折價券.png" alt="橘折價券" class="coupon" id="orange-coupon" onclick="useCoupon(this, '橘折價券已使用.png')">
    </div>

    <script>
        function useCoupon(element, usedImageSrc) {
            element.src = usedImageSrc;
            element.onclick = null;
            element.style.cursor = 'default';
        }
    </script>
</body>
</html>

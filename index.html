<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>604 園遊會快核</title>
    
    <link rel="preload" as="image" href="園遊會傳單604 的複本.jpg">
    <link rel="preload" as="image" href="園遊會傳單604 的複本 4.jpg">
    
    <style>
        /* 針對手機顯示優化 */
        body {
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-user-select: none; /* 防止手機長按選取文字 */
        }

        .flyer-app {
            width: 100vw; /* 滿寬 */
            max-width: 480px;
            position: relative;
            background: #fff;
            line-height: 0;
        }

        /* 降低圖片解析度感知：稍微增加一點對比度，讓低畫質看起來比較清晰 */
        img {
            width: 100%;
            height: auto;
            display: block;
            border: none;
            /* 效能優化：告訴瀏覽器這張圖不打算改變大小 */
            will-change: opacity;
            image-rendering: -webkit-optimize-contrast; /* 手機端渲染優化 */
        }

        /* 優惠券區塊：改用 Flex 佈局 */
        .coupon-group {
            display: flex;
            width: 100%;
            background: #fff;
        }

        .coupon-btn {
            flex: 1;
            position: relative;
            touch-action: manipulation; /* 優化手機點擊延遲 */
        }

        /* 已使用圖層：預設不渲染 */
        .used-stamp {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* 點擊後的視覺回饋 */
        .coupon-btn.active .used-stamp {
            opacity: 1;
        }

        /* 針對「只有手機用」的按鈕優化 */
        .coupon-btn:active {
            filter: brightness(0.9);
        }

        /* 狀態列提示 */
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(50%);
            width: 80%;
            background: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 8px 0;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="flyer-app">
        <img src="園遊會傳單604 的複本 6.jpg" loading="eager">

        <div class="coupon-group">
            <div class="coupon-btn" onclick="redeem(this)">
                <img src="園遊會傳單604 的複本 3.png">
                <img src="園遊會傳單604 的複本.jpg" class="used-stamp">
            </div>

            <div class="coupon-btn" onclick="redeem(this)">
                <img src="園遊會傳單604 的複本 2.png">
                <img src="園遊會傳單604 的複本 4.jpg" class="used-stamp">
            </div>
        </div>
    </div>

    <script>
        function redeem(el) {
            if (el.classList.contains('active')) return;

            // 執行核銷
            el.classList.add('active');

            // 手機震動反饋
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(40);
            }
        }

        // 禁止手機雙擊縮放導致的延遲
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>

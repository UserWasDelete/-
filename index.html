<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>604 園遊會核銷</title>
    
    <link rel="preload" as="image" href="黃折價券已使用.jpg">
    <link rel="preload" as="image" href="橘折價券已使用.jpg">
    
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .app-container {
            width: 100vw;
            max-width: 500px;
            background: #fff;
            line-height: 0; /* 消除圖片間縫隙 */
        }

        img {
            width: 100%;
            display: block;
            border: none;
            -webkit-user-drag: none;
        }

        .coupon-row {
            display: flex;
            width: 100%;
        }

        .coupon-box {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        /* 已使用遮罩圖層 */
        .used-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 10;
        }

        /* 點擊後變為已使用 */
        .coupon-box.active .used-img {
            opacity: 1;
        }

        /* 手機點擊視覺回饋 */
        .coupon-box:active {
            filter: brightness(0.9);
        }

        .hint {
            background: #000;
            color: #aaa;
            text-align: center;
            padding: 15px 0;
            font-size: 12px;
            letter-spacing: 1px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="app-container">
    <img src="園遊會傳單604 的複本 6.jpg" alt="傳單主體">

    <div class="coupon-row">
        <div class="coupon-box" onclick="useCoupon(this)">
            <img src="黃折價券.png" alt="黃券">
            <img src="黃折價券已使用.jpg" class="used-img" alt="黃券已使用">
        </div>

        <div class="coupon-box" onclick="useCoupon(this)">
            <img src="橘折價券.png" alt="橘券">
            <img src="橘折價券已使用.jpg" class="used-img" alt="橘券已使用">
        </div>
    </div>

    <div class="hint">
        604 園遊會專用核銷系統<br>
        點擊上方折價券進行使用
    </div>
</div>

<script>
    function useCoupon(el) {
        if (!el.classList.contains('active')) {
            el.classList.add('active');
            
            // 輕微震動回饋
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        }
    }

    // 禁止雙指縮放
    document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
            event.preventDefault();
        }
    }, { passive: false });
</script>

</body>
</html>

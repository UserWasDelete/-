<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>604 園遊會互動傳單</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        /* 傳單上半部 */
        .main-flyer {
            width: 100%;
            display: block;
        }
        /* 優惠券區域 */
        .coupon-section {
            display: flex;
            width: 100%;
            cursor: pointer;
        }
        .coupon-box {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .coupon-box img {
            width: 100%;
            display: block;
        }
        /* 「已使用」圖片預設隱藏，疊在原本圖片上 */
        .used-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none; /* 避免擋住點擊事件 */
        }
        /* 當 active 狀態時顯示已使用圖片 */
        .coupon-box.active .used-overlay {
            opacity: 1;
        }
        .hint {
            margin-top: 15px;
            color: #555;
            font-weight: bold;
            background: #fff;
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="園遊會傳單604 的複本 6.jpg" class="main-flyer">

        <div class="coupon-section">
            <div class="coupon-box" onclick="markUsed(this)">
                <img src="園遊會傳單604 的複本 3.png" alt="折價券1">
                <img src="園遊會傳單604 的複本.jpg" class="used-overlay" alt="已使用1">
            </div>

            <div class="coupon-box" onclick="markUsed(this)">
                <img src="園遊會傳單604 的複本 2.png" alt="折價券2">
                <img src="園遊會傳單604 的複本 4.jpg" class="used-overlay" alt="已使用2">
            </div>
        </div>
    </div>

    <div class="hint">💡 提示：點擊下方折價券即可核銷</div>

    <script>
        function markUsed(element) {
            // 加入 active 類別來顯示「已使用」圖片
            element.classList.add('active');
            
            // 可選：加入簡單的震動效果（僅支援部分安卓手機）
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>604 園遊會核銷</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        .container {
            width: 100vw;
            max-width: 480px;
            background: #fff;
            line-height: 0;
        }
        img {
            width: 100%;
            display: block;
        }
        .coupon-row {
            display: flex;
            width: 100%;
        }
        .coupon-box {
            flex: 1;
            position: relative;
            cursor: pointer;
        }
        /* 已使用遮罩圖層 */
        .used-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }
        .coupon-box.active .used-img {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="園遊會傳單604結構.png">

    <div class="coupon-row">
        <div class="coupon-box" onclick="use(this)">
            <img src="黃折價券.png">
            <img src="黃折價券已使用.png" class="used-img">
        </div>

        <div class="coupon-box" onclick="use(this)">
            <img src="橘折價券.png">
            <img src="橘折價券已使用.png" class="used-img">
        </div>
    </div>
</div>

<script>
    function use(el) {
        el.classList.add('active');
        if (navigator.vibrate) navigator.vibrate(50);
    }
</script>

</body>
</html>

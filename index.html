<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>園遊會傳單</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100svh; /* 支援行動裝置動態高度 */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333; /* 改深色背景更能看清邊界 */
            overflow: hidden;
        }

        #flyer-wrapper {
            position: relative;
            display: flex; /* 改用 flex 避免行內元素間隙 */
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100svh;
        }

        #flyer-image {
            max-width: 100%;
            max-height: 100vh;
            max-height: 100svh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .coupon {
            position: absolute;
            width: 50%;
            /* 高度比例: 28.77 / 148.5 = 19.3737% */
            height: 19.374%;
            /* 垂直位置比例: 119.73 / 148.5 = 80.6262% */
            top: 80.626%;
            z-index: 1000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊高亮 */
        }

        #yellow-coupon {
            left: 0;
        }

        #orange-coupon {
            left: 50%;
        }

        .coupon:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="flyer-wrapper">
        <img src="園遊會傳單604結構.png" alt="園遊會傳單" id="flyer-image">
        <img src="黃折價券.png" alt="黃折價券" class="coupon" id="yellow-coupon" onclick="useCoupon(this, '黃折價券已使用.png')">
        <img src="橘折價券.png" alt="橘折價券" class="coupon" id="orange-coupon" onclick="useCoupon(this, '橘折價券已使用.png')">
    </div>

    <script>
        function useCoupon(element, usedImageSrc) {
            element.src = usedImageSrc;
            element.onclick = null;
            element.style.cursor = 'default';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>園遊會傳單</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        #flyer-wrapper {
            position: relative;
            display: inline-block;
            line-height: 0;
            max-width: 100vw;
            max-height: 100vh;
        }

        #flyer-image {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            display: block;
        }

        .coupon {
            position: absolute;
            width: 50%;
            height: 19.374%;
            top: 80.626%;
            z-index: 1000;
            cursor: pointer; /* 讓鼠標變成手型，提示可點擊 */
            transition: opacity 0.3s; /* 增加一點點切換時的平滑感 */
        }

        #yellow-coupon {
            left: 0;
        }

        #orange-coupon {
            left: 50%;
        }

        .coupon:active {
            transform: scale(0.98); /* 點擊時輕微縮小，增加回饋感 */
        }
    </style>
</head>
<body>
    <div id="flyer-wrapper">
        <img src="園遊會傳單604結構.png" alt="園遊會傳單" id="flyer-image">
        <img src="黃折價券.png" alt="黃折價券" class="coupon" id="yellow-coupon" onclick="useCoupon(this, '黃折價券已使用.png')">
        <img src="橘折價券.png" alt="橘折價券" class="coupon" id="orange-coupon" onclick="useCoupon(this, '橘折價券已使用.png')">
    </div>

    <script>
        function useCoupon(element, usedImageSrc) {
            // 切換圖片來源
            element.src = usedImageSrc;
            // 移除點擊事件，避免重複觸發
            element.onclick = null;
            // 改變鼠標樣式，表示已不可點擊
            element.style.cursor = 'default';
        }
    </script>
</body>
</html>
